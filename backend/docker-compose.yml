services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_docker
    hostname: sqlserver  
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Developer
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data: